server:
  port: 5000

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management: # 🛠️ ZEDNA BLOCK ACTUATOR PERFECTLY ALIGNED BACH MAY-B9ACH L-404!
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
