server:
  port: 5001
spring:
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: false
      open-in-view: false
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://localhost:5432/yt_job_portal_user
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

eureka:
  client:
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,actuator
  endpoint:
    health:
      show-details: always