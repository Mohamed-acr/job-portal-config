server:
  port: 5007git add .
  git commit -m "Change AI service port to 5007 to avoid ERR_UNSAFE_PORT"

spring:
  application:
    name: job-portal-ai-service

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true