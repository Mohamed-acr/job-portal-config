server:
  port: 5002

spring:
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
          ddl-auto: update
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://localhost:5432/yt_job_portal_company
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true # 🛠️ CORRIGÉ: register-with-eureka
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
