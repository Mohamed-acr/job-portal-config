spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://localhost:5432/yt_job_portal_preferences
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

server:
  port: 5006